# CI — validate both oh-my-pi plugins on every push and pull request.
#
# This repo ships TWO omp plugins from one tree:
#   Plugin A  elon-ko-gate        extension-package  (package.json#omp.extensions, TS)
#   Plugin B  elon-ko-agents   marketplace        (.omp-plugin/marketplace.json, markdown)
#
# The gate has three layers:
#   1. typecheck      Plugin A TypeScript compiles (tsc --noEmit)
#   2. validate       structural integrity of both trees (scripts/validate-plugins.sh)
#   3. omp smoke-test install both plugins through the real `omp` binary
name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate plugins (typecheck + structure + omp install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Toolchain: node+npm for the deterministic typecheck (repo ships
      # package-lock.json); bun because `omp plugin install` of an
      # extension-package resolves deps with `bun install`.
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - uses: oven-sh/setup-bun@v2

      - name: Install deps (npm ci)
        run: npm ci

      # Layer 1 — Plugin A TypeScript.
      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Layer 2 — structural integrity of both plugins (bash + jq, no deps).
      - name: Validate plugin structure
        run: bash scripts/validate-plugins.sh

      # Layer 3 — prove omp itself accepts both trees. Install the omp binary
      # (no bun needed for omp itself), then exercise the real install paths.
      - name: Install omp (binary)
        run: |
          curl -fsSL https://omp.sh/install | sh -s -- --binary
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: omp version
        run: omp --version

      # Plugin B is pure markdown — installs without bun. Add the local
      # marketplace (note the required "./" prefix), install, assert it
      # registered, then clean up (the runner is ephemeral, cleanup is hygiene).
      - name: Smoke-test Plugin B (marketplace, markdown)
        run: |
          omp plugin marketplace add ./
          omp plugin install elon-ko-agents@elon-ko
          omp plugin list --json | jq -e '.marketplace | length > 0' >/dev/null
          omp plugin uninstall elon-ko-agents@elon-ko || true
          omp plugin marketplace remove elon-ko || true

      # Plugin A is a TypeScript extension-package — its install runs
      # `bun install`, so bun must be present. Dry-run first, then a real
      # install to exercise dep resolution + extension registration.
      - name: Smoke-test Plugin A (extension-package, bun)
        run: |
          omp plugin install . --dry-run
          omp plugin install .
          omp plugin list --json | jq -e '.npm | length > 0' >/dev/null
          omp plugin uninstall elon-ko-gate || true

  # Regression guard for the one-liner installer. Runs the repo's OWN checked-out
  # elon_ko.sh (NOT a hand-written install) with Plugin A pinned to the commit
  # under test. If elon_ko.sh's github-ref delimiter regresses from '#' back to
  # '@', the pinned source becomes github:owner/repo@<sha> -> omp fetches
  # api.github.com/repos//<sha>/tarball/ -> 404 -> elon_ko.sh dies -> job fails.
  # A hand-written '#' install could NOT catch that revert; only executing
  # elon_ko.sh itself can. elon_ko.sh bootstraps omp + bun itself, so (unlike
  # `validate`) no node/bun setup is needed here.
  installer-one-liner:
    name: One-liner installer smoke (elon_ko.sh)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships curl, git, unzip, ca-certificates — the only
      # prerequisites elon_ko.sh needs (it installs omp + bun itself).
      - name: Ensure prerequisites
        run: |
          for b in curl git unzip; do command -v "$b" >/dev/null || { echo "::error::missing $b"; exit 1; }; done

      # Execute the CHECKED-OUT installer with Plugin A pinned to THIS commit,
      # so we test the code under review, not the latest release tag.
      - name: Run elon_ko.sh (Plugin A pinned to this commit)
        env:
          OMP_AGENT_REF: ${{ github.sha }}
        run: |
          bash ./elon_ko.sh
          # elon_ko.sh installs omp/bun under these dirs; expose them to later steps.
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: omp version
        run: omp --version

      # elon_ko.sh's own `set -e`/`die` already fails the prior step on any
      # install error; this confirms BOTH plugins actually registered, with
      # Plugin A at the version pinned by this commit's package.json.
      - name: Assert both plugins installed
        run: |
          set -euo pipefail
          expected="$(jq -r .version package.json)"
          echo "expected elon-ko-gate version: ${expected}"
          json="$(omp plugin list --json)"
          echo "$json" | jq -e --arg v "$expected" \
            '.npm | map(select(.name == "elon-ko-gate" and .version == $v)) | length >= 1' \
            || { echo "::error::elon-ko-gate@${expected} not installed"; exit 1; }
          echo "  ok: elon-ko-gate@${expected} installed"
          echo "$json" | jq -e \
            '.marketplace | map(select(.id == "elon-ko-agents@elon-ko")) | length >= 1' \
            || { echo "::error::elon-ko-agents not installed"; exit 1; }
          echo "  ok: elon-ko-agents installed"
