# Release — build versioned oh-my-pi plugin artifacts and publish a GitHub
# Release. Triggered by a `v*` tag.
#
# omp consumes plugins directly from git: `omp plugin install github:owner/repo#<tag>`.
# The tag is therefore the distribution pin. This workflow additionally attaches
# two consumable archives so each plugin is also installable offline / locally:
#
#   elon-ko-gate-<ver>.tgz          Plugin A, npm-packed (respects package.json#files)
#   elon-ko-agents-<ver>.tar.gz  Plugin B, self-contained marketplace tree
#                                     (`.omp-plugin/` catalog + `plugins/`), consumable
#                                     via `omp plugin marketplace add <extracted>`
#
# Both are gated through the same typecheck + structural validation as CI before
# the release is cut, and the tag is asserted to match package.json#version.
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build artifacts & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install deps
        run: npm ci

      # Gate: never cut a release from a broken tree.
      - name: Typecheck
        run: npm run typecheck
      - name: Validate plugin structure
        run: bash scripts/validate-plugins.sh

      - name: Read version
        id: ver
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      # Fail loud if the tag doesn't match the manifest version — prevents
      # shipping a release whose pin disagrees with the shipped metadata.
      - name: Assert tag matches package.json#version
        run: |
          expected="v${{ steps.ver.outputs.version }}"
          echo "tag=${GITHUB_REF_NAME}  manifest=${expected}"
          [ "${GITHUB_REF_NAME}" = "${expected}" ] || {
            echo "::error::Tag ${GITHUB_REF_NAME} does not match manifest version ${expected}"
            exit 1
          }

      # Plugin A — npm pack honours package.json#files (src/, rules/).
      - name: Build Plugin A artifact (elon-ko-gate)
        run: npm pack

      # Plugin B — the marketplace root is the repo root; ship the catalog
      # alongside the plugins tree so `omp plugin marketplace add <dir>` works.
      - name: Build Plugin B artifact (elon-ko-agents)
        run: |
          tar -czf "elon-ko-agents-${{ steps.ver.outputs.version }}.tar.gz" \
              .omp-plugin plugins

      - name: Compute checksums
        run: |
          sha256sum \
            "elon-ko-gate-${{ steps.ver.outputs.version }}.tgz" \
            "elon-ko-agents-${{ steps.ver.outputs.version }}.tar.gz" \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Install with oh-my-pi (`omp`)

            **Plugin A — `elon-ko-gate`** (enforcement gate; requires [bun](https://bun.sh))

            ```bash
            # tag-pinned (this release)
            omp plugin install github:${{ github.repository }}#${{ github.ref_name }}
            # default branch
            omp plugin install github:${{ github.repository }}
            ```

            **Plugin B — `elon-ko-agents`** (7 agents + 8 skills; markdown only)

            ```bash
            omp plugin marketplace add ${{ github.repository }}
            omp plugin install elon-ko-agents@elon-ko
            ```

            ## Artifacts

            | File | Plugin | Install locally |
            |---|---|---|
            | `elon-ko-gate-${{ steps.ver.outputs.version }}.tgz` | A (extension-package) | `omp plugin install ./elon-ko-gate-${{ steps.ver.outputs.version }}.tgz` |
            | `elon-ko-agents-${{ steps.ver.outputs.version }}.tar.gz` | B (marketplace) | extract, then `omp plugin marketplace add ./<dir>` |

            See `SHA256SUMS` for checksums.
          files: |
            elon-ko-gate-${{ steps.ver.outputs.version }}.tgz
            elon-ko-agents-${{ steps.ver.outputs.version }}.tar.gz
            SHA256SUMS
